<!-- ============================================
     Style.html - CSS Material Design RTL
     ============================================ -->

<style>
/* ============================================
   CSS Variables - ألوان النظام
   ============================================ */
:root {
  /* الألوان الأساسية */
  --primary: #1976D2;
  --primary-dark: #115293;
  --primary-light: #4791DB;
  --primary-50: #E3F2FD;
  
  /* الألوان الثانوية */
  --secondary: #FF9800;
  --secondary-dark: #F57C00;
  
  /* حالات الشحنات */
  --status-unassigned: #9E9E9E;
  --status-ready: #2196F3;
  --status-delivered: #4CAF50;
  --status-no-answer: #FF9800;
  --status-postponed: #9C27B0;
  --status-returned: #F44336;
  --status-rejected-quality: #795548;
  --status-rejected-delay: #607D8B;
  --status-closed: #000000;
  
  /* الأولويات */
  --priority-low: #8BC34A;
  --priority-normal: #2196F3;
  --priority-high: #FF9800;
  --priority-urgent: #F44336;
  
  /* الرمادي */
  --gray-50: #FAFAFA;
  --gray-100: #F5F5F5;
  --gray-200: #EEEEEE;
  --gray-300: #E0E0E0;
  --gray-400: #BDBDBD;
  --gray-500: #9E9E9E;
  --gray-600: #757575;
  --gray-700: #616161;
  --gray-800: #424242;
  --gray-900: #212121;
  
  /* الألوان العامة */
  --success: #4CAF50;
  --error: #F44336;
  --warning: #FF9800;
  --info: #2196F3;
  
  /* الظلال */
  --shadow-1: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24);
  --shadow-2: 0 3px 6px rgba(0,0,0,0.16), 0 3px 6px rgba(0,0,0,0.23);
  --shadow-3: 0 10px 20px rgba(0,0,0,0.19), 0 6px 6px rgba(0,0,0,0.23);
  --shadow-4: 0 14px 28px rgba(0,0,0,0.25), 0 10px 10px rgba(0,0,0,0.22);
  
  /* الحدود */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  
  /* الانتقالات */
  --transition-fast: 0.15s ease;
  --transition-normal: 0.25s ease;
  --transition-slow: 0.4s ease;
  
  /* الخط */
  --font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
  --font-size-xs: 11px;
  --font-size-sm: 13px;
  --font-size-md: 14px;
  --font-size-lg: 16px;
  --font-size-xl: 18px;
  --font-size-2xl: 24px;
  --font-size-3xl: 32px;
  
  /* المسافات */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  
  /* Sidebar */
  --sidebar-width: 260px;
  --sidebar-collapsed: 64px;
  
  /* Topbar */
  --topbar-height: 64px;
}

/* ============================================
   Reset & Base
   ============================================ */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-family);
  font-size: var(--font-size-md);
  line-height: 1.6;
  color: var(--gray-800);
  background: var(--gray-100);
  direction: rtl;
  text-align: right;
  overflow-x: hidden;
}

a {
  text-decoration: none;
  color: var(--primary);
  transition: color var(--transition-fast);
}

a:hover {
  color: var(--primary-dark);
}

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  outline: none;
}

input, textarea, select {
  font-family: inherit;
  font-size: inherit;
  direction: rtl;
}

/* ============================================
   Scrollbar
   ============================================ */
::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}

::-webkit-scrollbar-track {
  background: var(--gray-200);
  border-radius: var(--radius-sm);
}

::-webkit-scrollbar-thumb {
  background: var(--gray-400);
  border-radius: var(--radius-sm);
}

::-webkit-scrollbar-thumb:hover {
  background: var(--gray-500);
}

/* ============================================
   Loading Screen
   ============================================ */
.loading-screen {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity var(--transition-slow);
}

.loading-screen.hidden {
  opacity: 0;
  pointer-events: none;
}

.loading-spinner {
  width: 56px;
  height: 56px;
  border: 4px solid var(--primary-50);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-text {
  margin-top: var(--space-4);
  color: var(--gray-600);
  font-size: var(--font-size-lg);
  font-weight: 500;
}

/* ============================================
   Toast Notifications
   ============================================ */
.toast-container {
  position: fixed;
  top: var(--space-4);
  left: var(--space-4);
  z-index: 10000;
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}

.toast {
  min-width: 300px;
  max-width: 400px;
  padding: var(--space-4);
  border-radius: var(--radius-md);
  background: #fff;
  box-shadow: var(--shadow-3);
  display: flex;
  align-items: center;
  gap: var(--space-3);
  animation: slideInLeft var(--transition-normal);
  border-right: 4px solid;
}

.toast.success { border-color: var(--success); }
.toast.error { border-color: var(--error); }
.toast.warning { border-color: var(--warning); }
.toast.info { border-color: var(--info); }

.toast-icon {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: var(--font-size-sm);
  font-weight: bold;
}

.toast.success .toast-icon { background: var(--success); color: #fff; }
.toast.error .toast-icon { background: var(--error); color: #fff; }
.toast.warning .toast-icon { background: var(--warning); color: #fff; }
.toast.info .toast-icon { background: var(--info); color: #fff; }

.toast-content {
  flex: 1;
}

.toast-title {
  font-weight: 600;
  font-size: var(--font-size-md);
  margin-bottom: var(--space-1);
}

.toast-message {
  font-size: var(--font-size-sm);
  color: var(--gray-600);
}

.toast-close {
  background: none;
  border: none;
  color: var(--gray-400);
  cursor: pointer;
  font-size: var(--font-size-lg);
  padding: 0;
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color var(--transition-fast);
}

.toast-close:hover {
  color: var(--gray-700);
}

@keyframes slideInLeft {
  from {
    opacity: 0;
    transform: translateX(-100%);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

@keyframes slideOutLeft {
  from {
    opacity: 1;
    transform: translateX(0);
  }
  to {
    opacity: 0;
    transform: translateX(-100%);
  }
}

/* ============================================
   Login Page
   ============================================ */
.login-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--primary-50) 0%, #fff 100%);
  padding: var(--space-4);
}

.login-card {
  background: #fff;
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-3);
  width: 100%;
  max-width: 420px;
  padding: var(--space-8);
  animation: fadeInUp var(--transition-slow);
}

.login-logo {
  text-align: center;
  margin-bottom: var(--space-6);
}

.login-logo-icon {
  width: 72px;
  height: 72px;
  background: var(--primary);
  border-radius: var(--radius-lg);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: var(--font-size-3xl);
  margin-bottom: var(--space-3);
}

.login-logo h1 {
  font-size: var(--font-size-xl);
  color: var(--gray-800);
  font-weight: 600;
}

.login-logo p {
  font-size: var(--font-size-sm);
  color: var(--gray-500);
  margin-top: var(--space-1);
}

.login-form .form-group {
  margin-bottom: var(--space-5);
}

.login-form label {
  display: block;
  font-size: var(--font-size-sm);
  font-weight: 500;
  color: var(--gray-700);
  margin-bottom: var(--space-2);
}

.login-form input {
  width: 100%;
  padding: var(--space-3) var(--space-4);
  border: 2px solid var(--gray-200);
  border-radius: var(--radius-md);
  font-size: var(--font-size-md);
  transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
}

.login-form input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.1);
}

.login-form input::placeholder {
  color: var(--gray-400);
}

.login-btn {
  width: 100%;
  padding: var(--space-3) var(--space-4);
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: var(--radius-md);
  font-size: var(--font-size-md);
  font-weight: 600;
  cursor: pointer;
  transition: background var(--transition-fast), transform var(--transition-fast);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
}

.login-btn:hover {
  background: var(--primary-dark);
  transform: translateY(-1px);
}

.login-btn:active {
  transform: translateY(0);
}

.login-btn:disabled {
  background: var(--gray-400);
  cursor: not-allowed;
  transform: none;
}

.login-error {
  background: #FFEBEE;
  color: var(--error);
  padding: var(--space-3) var(--space-4);
  border-radius: var(--radius-md);
  font-size: var(--font-size-sm);
  margin-bottom: var(--space-4);
  display: none;
  align-items: center;
  gap: var(--space-2);
}

.login-error.show {
  display: flex;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ============================================
   Layout - Sidebar + Topbar + Content
   ============================================ */
.app-layout {
  display: flex;
  min-height: 100vh;
}

/* Sidebar */
.sidebar {
  width: var(--sidebar-width);
  background: #fff;
  box-shadow: var(--shadow-2);
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  z-index: 100;
  display: flex;
  flex-direction: column;
  transition: width var(--transition-normal);
  overflow: hidden;
}

.sidebar.collapsed {
  width: var(--sidebar-collapsed);
}

.sidebar-header {
  height: var(--topbar-height);
  display: flex;
  align-items: center;
  padding: 0 var(--space-4);
  border-bottom: 1px solid var(--gray-200);
  gap: var(--space-3);
}

.sidebar-logo {
  width: 40px;
  height: 40px;
  background: var(--primary);
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: var(--font-size-lg);
  flex-shrink: 0;
}

.sidebar-title {
  font-size: var(--font-size-md);
  font-weight: 600;
  color: var(--gray-800);
  white-space: nowrap;
  opacity: 1;
  transition: opacity var(--transition-fast);
}

.sidebar.collapsed .sidebar-title {
  opacity: 0;
  width: 0;
}

.sidebar-toggle {
  margin-right: auto;
  background: none;
  border: none;
  color: var(--gray-500);
  cursor: pointer;
  padding: var(--space-2);
  border-radius: var(--radius-sm);
  transition: background var(--transition-fast);
}

.sidebar-toggle:hover {
  background: var(--gray-100);
}

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: var(--space-3) 0;
}

.sidebar-menu {
  list-style: none;
  padding: 0;
}

.sidebar-menu-item {
  margin: var(--space-1) 0;
}

.sidebar-menu-link {
  display: flex;
  align-items: center;
  padding: var(--space-3) var(--space-4);
  color: var(--gray-600);
  font-size: var(--font-size-md);
  transition: all var(--transition-fast);
  position: relative;
  gap: var(--space-3);
  white-space: nowrap;
}

.sidebar-menu-link:hover {
  background: var(--gray-50);
  color: var(--primary);
}

.sidebar-menu-link.active {
  background: var(--primary-50);
  color: var(--primary);
  font-weight: 500;
}

.sidebar-menu-link.active::before {
  content: '';
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--primary);
  border-radius: 0 2px 2px 0;
}

.sidebar-menu-icon {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: var(--font-size-lg);
}

.sidebar-menu-text {
  opacity: 1;
  transition: opacity var(--transition-fast);
}

.sidebar.collapsed .sidebar-menu-text {
  opacity: 0;
  width: 0;
}

.sidebar-footer {
  padding: var(--space-3) var(--space-4);
  border-top: 1px solid var(--gray-200);
}

.sidebar-user {
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

.sidebar-user-avatar {
  width: 36px;
  height: 36px;
  background: var(--primary);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-weight: 600;
  font-size: var(--font-size-sm);
  flex-shrink: 0;
}

.sidebar-user-info {
  opacity: 1;
  transition: opacity var(--transition-fast);
  overflow: hidden;
}

.sidebar.collapsed .sidebar-user-info {
  opacity: 0;
  width: 0;
}

.sidebar-user-name {
  font-size: var(--font-size-sm);
  font-weight: 600;
  color: var(--gray-800);
  white-space: nowrap;
}

.sidebar-user-role {
  font-size: var(--font-size-xs);
  color: var(--gray-500);
  white-space: nowrap;
}

/* Topbar */
.topbar {
  height: var(--topbar-height);
  background: #fff;
  box-shadow: var(--shadow-1);
  position: fixed;
  top: 0;
  left: 0;
  right: var(--sidebar-width);
  z-index: 90;
  display: flex;
  align-items: center;
  padding: 0 var(--space-5);
  transition: right var(--transition-normal);
}

.sidebar.collapsed ~ .main-content .topbar {
  right: var(--sidebar-collapsed);
}

.topbar-title {
  font-size: var(--font-size-lg);
  font-weight: 600;
  color: var(--gray-800);
}

.topbar-actions {
  margin-right: auto;
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

.topbar-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: none;
  border: none;
  color: var(--gray-600);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--font-size-lg);
  position: relative;
  transition: background var(--transition-fast);
}

.topbar-btn:hover {
  background: var(--gray-100);
}

.topbar-badge {
  position: absolute;
  top: 2px;
  left: 2px;
  width: 18px;
  height: 18px;
  background: var(--error);
  color: #fff;
  font-size: var(--font-size-xs);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
}

/* Main Content */
.main-content {
  flex: 1;
  margin-right: var(--sidebar-width);
  padding-top: var(--topbar-height);
  transition: margin-right var(--transition-normal);
}

.sidebar.collapsed ~ .main-content {
  margin-right: var(--sidebar-collapsed);
}

.page-content {
  padding: var(--space-6);
}

/* ============================================
   Cards
   ============================================ */
.card {
  background: #fff;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-1);
  overflow: hidden;
  transition: box-shadow var(--transition-normal);
}

.card:hover {
  box-shadow: var(--shadow-2);
}

.card-header {
  padding: var(--space-4) var(--space-5);
  border-bottom: 1px solid var(--gray-200);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-title {
  font-size: var(--font-size-lg);
  font-weight: 600;
  color: var(--gray-800);
}

.card-body {
  padding: var(--space-5);
}

.card-footer {
  padding: var(--space-4) var(--space-5);
  border-top: 1px solid var(--gray-200);
  background: var(--gray-50);
}

/* Stat Cards */
.stat-card {
  background: #fff;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-1);
  padding: var(--space-5);
  display: flex;
  align-items: center;
  gap: var(--space-4);
  transition: transform var(--transition-normal), box-shadow var(--transition-normal);
}

.stat-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-2);
}

.stat-icon {
  width: 56px;
  height: 56px;
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--font-size-2xl);
  flex-shrink: 0;
}

.stat-icon.blue { background: var(--primary-50); color: var(--primary); }
.stat-icon.green { background: #E8F5E9; color: var(--success); }
.stat-icon.orange { background: #FFF3E0; color: var(--warning); }
.stat-icon.red { background: #FFEBEE; color: var(--error); }
.stat-icon.purple { background: #F3E5F5; color: #9C27B0; }
.stat-icon.gray { background: var(--gray-100); color: var(--gray-600); }

.stat-info {
  flex: 1;
}

.stat-value {
  font-size: var(--font-size-2xl);
  font-weight: 700;
  color: var(--gray-800);
  line-height: 1.2;
}

.stat-label {
  font-size: var(--font-size-sm);
  color: var(--gray-500);
  margin-top: var(--space-1);
}

.stat-change {
  font-size: var(--font-size-xs);
  font-weight: 600;
  padding: var(--space-1) var(--space-2);
  border-radius: var(--radius-sm);
}

.stat-change.positive {
  color: var(--success);
  background: #E8F5E9;
}

.stat-change.negative {
  color: var(--error);
  background: #FFEBEE;
}

/* ============================================
   Tables
   ============================================ */
.table-container {
  overflow-x: auto;
  border-radius: var(--radius-lg);
  background: #fff;
  box-shadow: var(--shadow-1);
}

.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--font-size-sm);
}

.data-table thead th {
  background: var(--gray-50);
  color: var(--gray-700);
  font-weight: 600;
  text-align: right;
  padding: var(--space-3) var(--space-4);
  border-bottom: 2px solid var(--gray-200);
  white-space: nowrap;
  position: sticky;
  top: 0;
  z-index: 10;
}

.data-table tbody td {
  padding: var(--space-3) var(--space-4);
  border-bottom: 1px solid var(--gray-100);
  color: var(--gray-700);
  vertical-align: middle;
}

.data-table tbody tr {
  transition: background var(--transition-fast);
}

.data-table tbody tr:hover {
  background: var(--gray-50);
}

.data-table tbody tr:last-child td {
  border-bottom: none;
}

/* Status Badge */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  padding: var(--space-1) var(--space-3);
  border-radius: 20px;
  font-size: var(--font-size-xs);
  font-weight: 600;
  white-space: nowrap;
}

.status-badge::before {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.status-badge.unassigned { background: #F5F5F5; color: var(--gray-600); }
.status-badge.unassigned::before { background: var(--status-unassigned); }

.status-badge.ready { background: #E3F2FD; color: var(--primary); }
.status-badge.ready::before { background: var(--status-ready); }

.status-badge.delivered { background: #E8F5E9; color: var(--success); }
.status-badge.delivered::before { background: var(--status-delivered); }

.status-badge.no-answer { background: #FFF3E0; color: var(--warning); }
.status-badge.no-answer::before { background: var(--status-no-answer); }

.status-badge.postponed { background: #F3E5F5; color: #9C27B0; }
.status-badge.postponed::before { background: var(--status-postponed); }

.status-badge.returned { background: #FFEBEE; color: var(--error); }
.status-badge.returned::before { background: var(--status-returned); }

.status-badge.rejected-quality { background: #EFEBE9; color: #795548; }
.status-badge.rejected-quality::before { background: var(--status-rejected-quality); }

.status-badge.rejected-delay { background: #ECEFF1; color: #607D8B; }
.status-badge.rejected-delay::before { background: var(--status-rejected-delay); }
